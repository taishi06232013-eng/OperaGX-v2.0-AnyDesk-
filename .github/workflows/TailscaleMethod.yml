name: RDP + Tailscale (Opera GX Test Run)

on:
  workflow_dispatch:
    inputs:
      ts_tailnet:         { description: "Tailscale tailnet (e.g. you@gmail.com)", required: true }
      ts_authkey:         { description: "Tailscale Auth key", required: true }
      ts_api_key:         { description: "Tailscale API key", required: true }
      runtime_minutes:    { description: "Runtime (max 360)", required: false, default: "355" }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

defaults:
  run:
    shell: pwsh

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 370
    env:
      RDP_USER: "user"
      RDP_PASS: "Pass1234"

    steps:
      - name: Wipe Unnecessary Pre-Installed GitHub Apps & Shortcuts
        run: |
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $targets = @("Unity Hub.lnk", "R 4.6.0.lnk", "Firefox.lnk", "Google Chrome.lnk", "Claim Rewards Here.lnk")
          foreach ($target in $targets) { Remove-Item "$publicDesktop\$target" -Force -ErrorAction SilentlyContinue }

      - name: Dismiss Annoying Windows System Properties Popups
        run: |
          Write-Host "Killing background error popups..."
          Stop-Process -Name "systempropertiesadvanced" -Force -ErrorAction SilentlyContinue
          Stop-Process -Name "systempropertiescomputername" -Force -ErrorAction SilentlyContinue

      - name: Fetch and Save Official Forsaken Installer to Desktop
        run: |
          Write-Host "Simulating official live session on the Opera GX Forsaken page..."
          $landingUrl = "https://www.opera.com/gx/forsaken"
          $userAgent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          
          # Initialize session connection
          $webRequest = [System.Net.HttpWebRequest]::Create($landingUrl)
          $webRequest.UserAgent = $userAgent
          $webRequest.AllowAutoRedirect = $true
          $response = $webRequest.GetResponse()
          $finalUrl = $response.ResponseUri.AbsoluteUri
          $response.Close()
          
          # Force download routing straight through the exclusive landing domain
          $downloadUrl = "https://net.geo.opera.com/opera_gx/stable/windows?utm_source=inf&utm_medium=gx&utm_campaign=forsaken&http_referrer=$( [System.Uri]::EscapeDataString($finalUrl) )"
          
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $installerPath = "$publicDesktop\OperaGXSetup.exe"
          
          Write-Host "Downloading target event installer directly to Desktop..."
          $client = New-Object System.Net.WebClient
          $client.Headers.Add("User-Agent", $userAgent)
          $client.Headers.Add("Referer", $landingUrl)
          $client.DownloadFile($downloadUrl, $installerPath)
          
          Write-Host "Authentic Forsaken Event Installer downloaded successfully!"

      - name: Parse Runtime Requirements
        run: |
          function IntOr($v,$d){ if("$v" -match '^\d+$'){ [int]$v } else { [int]$d } }
          $runtime = IntOr("${{ inputs.runtime_minutes }}",355)
          if ($runtime -gt 360 -or $runtime -lt 1) { $runtime = 355 }
          "RUNTIME_MINUTES=$runtime" | Out-File -Append $env:GITHUB_ENV

      - name: Purge Legacy Machine Registrations
        run: |
          try {
            $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("${{ inputs.ts_api_key }}:"))
            $tn = [uri]::EscapeDataString("${{ inputs.ts_tailnet }}")
            $list = Invoke-RestMethod -Uri "https://api.tailscale.com/api/v2/tailnet/$tn/devices" -Headers @{ Authorization = "Basic $auth" }
            foreach($d in $list.devices){
              if ($d.hostname -match '^(bullet|pc)[0-9]*$'){
                Invoke-RestMethod -Method Delete -Uri "https://api.tailscale.com/api/v2/device/$($d.id)" -Headers @{ Authorization = "Basic $auth" } -ErrorAction SilentlyContinue
              }
            }
          } catch {}

      - name: Install & Authenticate Tailscale Network
        run: |
          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"
          if (-not (Test-Path $ts)) {
            $url = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
            $dst = "$env:TEMP\tailscale.msi"
            Invoke-WebRequest -Uri $url -OutFile $dst
            Start-Process msiexec.exe -ArgumentList "/i","`"$dst`"","/quiet","/norestart" -Wait
            Remove-Item $dst -Force
          }
          & $ts logout | Out-Null
          & $ts up --authkey "${{ inputs.ts_authkey }}" --hostname "pc" --accept-dns=true --accept-routes=true
          $ip4 = & $ts ip -4 | Select-Object -First 1
          Write-Host "Tailscale Dedicated Node IP: $ip4"

      - name: Provision RDP User Identity & Global System Rules
        run: |
          Rename-Computer -NewName "pc" -Force -ErrorAction SilentlyContinue
          
          $u = $env:RDP_USER
          $sec = ConvertTo-SecureString $env:RDP_PASS -AsPlainText -Force
          if (-not (Get-LocalUser -Name $u -EA SilentlyContinue)) {
            New-LocalUser -Name $u -Password $sec -AccountNeverExpires
            Add-LocalGroupMember -Group "Administrators" -Member $u
            Add-LocalGroupMember -Group "Remote Desktop Users" -Member $u
          } else {
            Set-LocalUser -Name $u -Password $sec -AccountNeverExpires
            Enable-LocalUser -Name $u
          }
          Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name fDenyTSConnections -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" | Out-Null

      - name: Structural Window Minimization
        run: |
          $shell = New-Object -ComObject Shell.Application
          $shell.MinimizeAll()

      - name: Connection Keep-Alive Loop
        run: |
          $mins = [int]$env:RUNTIME_MINUTES
          if (-not $mins) { $mins = 355 }
          
          $end = (Get-Date).AddMinutes($mins)
          while ((Get-Date) -lt $end) {
            Write-Host ("Tailscale/RDP Active Engine | Heartbeat " + (Get-Date).ToString("HH:mm:ss") + " ends at " + $end.ToString("HH:mm:ss"))
            Start-Sleep -Seconds 60
          }

      - name: Disconnect Tailscale Node Safely
        if: always()
        run: |
          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"
          if (Test-Path $ts) {
              Write-Host "Disconnecting machine and logging out of tailnet..."
              & $ts logout | Out-Null
          }
